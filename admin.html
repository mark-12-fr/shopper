<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopper Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --bg:#f1f5f9; --surface:#fff; --border:#e2e8f0; --text:#0f172a; --muted:#64748b; --primary:#2563eb; --danger:#ef4444; --ok:#059669; }
    @media (prefers-color-scheme: dark) { :root { --bg:#0f172a; --surface:#1e293b; --border:#334155; --text:#f1f5f9; --muted:#94a3b8; } }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); }
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; }
    header h1 { font-size:18px; margin:0; display:flex; gap:8px; align-items:center; }
    header a { color:var(--muted); text-decoration:none; font-size:13px; }
    .wrap { max-width:1000px; margin:0 auto; padding:20px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:16px; }
    input, select, textarea { width:100%; padding:9px 11px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font:inherit; }
    label { font-size:12px; color:var(--muted); display:block; margin:0 0 4px; }
    button { border:none; border-radius:8px; padding:9px 14px; font:inherit; font-weight:600; cursor:pointer; background:var(--primary); color:#fff; }
    button.ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
    button.danger { background:var(--danger); }
    button.small { padding:5px 10px; font-size:12px; }
    .tabs { display:flex; gap:8px; margin-bottom:16px; }
    .tabs button { background:var(--surface); color:var(--muted); border:1px solid var(--border); }
    .tabs button.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; padding:8px; border-bottom:1px solid var(--border); vertical-align:middle; }
    th { color:var(--muted); font-weight:600; }
    .row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:10px; }
    .hidden { display:none; }
    .pill { font-size:11px; padding:2px 8px; border-radius:999px; background:var(--bg); border:1px solid var(--border); }
    .muted { color:var(--muted); font-size:12px; }
    .msg { font-size:13px; margin-top:8px; }
    .msg.err { color:var(--danger); } .msg.ok { color:var(--ok); }
    img.thumb { width:40px; height:40px; object-fit:cover; border-radius:6px; }
    .table-scroll { overflow-x:auto; }
  </style>
</head>
<body>
  <header>
    <h1><i class="fas fa-store"></i> Shopper Admin</h1>
    <div><a href="/"><i class="fas fa-arrow-left"></i> Store</a> &nbsp; <button id="logoutBtn" class="ghost small hidden">Logout</button></div>
  </header>

  <div class="wrap">
    <!-- Login -->
    <div id="loginCard" class="card" style="max-width:360px;margin:60px auto;">
      <h2 style="margin-top:0;font-size:16px;"><i class="fas fa-lock"></i> Admin Login</h2>
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="Admin password" autocomplete="current-password">
      <button id="loginBtn" style="width:100%;margin-top:12px;">Log in</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <!-- Panel -->
    <div id="panel" class="hidden">
      <div class="tabs">
        <button data-tab="products" class="active">Products</button>
        <button data-tab="orders">Orders</button>
      </div>

      <!-- Products tab -->
      <div id="tab-products">
        <div class="card">
          <h3 style="margin-top:0;font-size:15px;">Add product</h3>
          <div class="row">
            <div><label>Name</label><input id="np_name"></div>
            <div><label>Category</label>
              <select id="np_category">
                <option value="electronics">electronics</option>
                <option value="fashion">fashion</option>
                <option value="home">home</option>
                <option value="beauty">beauty</option>
                <option value="food">food</option>
              </select>
            </div>
            <div><label>Price (₱)</label><input id="np_price" type="number" min="0"></div>
            <div><label>Original price</label><input id="np_orig" type="number" min="0"></div>
            <div><label>Stock</label><input id="np_stock" type="number" min="0"></div>
            <div><label>Image URL</label><input id="np_image" placeholder="https:// or upload →"></div>
            <div><label>Upload image</label>
              <div style="display:flex;gap:6px;align-items:center;">
                <input type="file" id="np_file" accept="image/*" style="padding:5px;">
                <button id="uploadBtn" class="ghost small" type="button">Upload</button>
              </div>
            </div>
          </div>
          <div id="np_preview" style="margin-bottom:8px;"></div>
          <div><label>Description</label><textarea id="np_desc" rows="2"></textarea></div>
          <button id="addProductBtn" style="margin-top:10px;"><i class="fas fa-plus"></i> Add product</button>
          <div id="addMsg" class="msg"></div>
        </div>
        <div class="card">
          <h3 style="margin-top:0;font-size:15px;">Catalog</h3>
          <div class="table-scroll">
            <table id="productsTable"><thead><tr>
              <th></th><th>Name</th><th>Cat</th><th>Price</th><th>Stock</th><th>Sold</th><th></th>
            </tr></thead><tbody></tbody></table>
          </div>
        </div>
      </div>

      <!-- Orders tab -->
      <div id="tab-orders" class="hidden">
        <div class="card">
          <h3 style="margin-top:0;font-size:15px;">All orders</h3>
          <div class="table-scroll">
            <table id="ordersTable"><thead><tr>
              <th>ID</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th><th></th>
            </tr></thead><tbody></tbody></table>
          </div>
          <div id="ordersEmpty" class="muted hidden">No orders yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
